name: Telegram Bot - Post Deals

on:
  schedule:
    - cron: '0 11 * * *'   # 08h BRT (UTC-3)
    - cron: '0 16 * * *'   # 13h BRT (UTC-3)
    - cron: '0 23 * * *'   # 20h BRT (UTC-3)
  workflow_dispatch:         # permite disparo manual pelo GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # necessário para comitar o state.json

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: telegram-bot/requirements.txt

      - name: Instalar dependências
        run: pip install -r telegram-bot/requirements.txt

      - name: Postar oferta agora
        working-directory: telegram-bot
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL:          ${{ secrets.GROQ_MODEL }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          SHOPEE_AFFILIATE_ID:  ${{ secrets.SHOPEE_AFFILIATE_ID }}
          ACTIVE_NICHE:        ${{ secrets.ACTIVE_NICHE }}
        run: python run.py --now

      - name: Salvar state.json (rotação de keywords)
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add telegram-bot/data/state.json
          git diff --staged --quiet || git commit -m "chore: atualiza state do bot $(date +%Y-%m-%d\ %H:%M) [skip ci]"
          git push
