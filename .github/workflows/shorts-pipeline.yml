name: Shorts Pipeline - Gerar e Subir Vídeos

on:
  schedule:
    - cron: '0 10 * * *'   # 7h BRT (UTC-3) — gera de manhã e agenda os vídeos para 12h/15h/18h/21h BRT
  workflow_dispatch:         # permite disparo manual pelo GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # para comitar pipeline.db

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: shorts-pipeline/requirements.txt

      - name: Instalar FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Instalar dependências Python
        run: pip install -r shorts-pipeline/requirements.txt

      - name: Escrever credenciais YouTube (OAuth)
        # Gere os secrets assim:
        #   client_secrets.json → base64 -w0 client_secrets.json
        #   token.json          → base64 -w0 token.json  (após auth local)
        # Cole o resultado em: GitHub → Settings → Secrets → YOUTUBE_CLIENT_SECRETS e YOUTUBE_TOKEN
        working-directory: shorts-pipeline
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN:          ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -n "$YOUTUBE_CLIENT_SECRETS" ]; then
            echo "$YOUTUBE_CLIENT_SECRETS" | base64 -d > client_secrets.json
          fi
          if [ -n "$YOUTUBE_TOKEN" ]; then
            echo "$YOUTUBE_TOKEN" | base64 -d > token.json
          fi

      - name: Executar pipeline de vídeos
        working-directory: shorts-pipeline
        env:
          LLM_PROVIDER:        groq
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL:          ${{ secrets.GROQ_MODEL }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          SHOPEE_AFFILIATE_ID:  ${{ secrets.SHOPEE_AFFILIATE_ID }}
          KLING_ACCESS_KEY:    ${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY:    ${{ secrets.KLING_SECRET_KEY }}
          ACTIVE_NICHE:        ${{ secrets.ACTIVE_NICHE }}
          VIDEO_ENCODER:       cpu
          YOUTUBE_AUTO_UPLOAD:      ${{ secrets.YOUTUBE_AUTO_UPLOAD }}
          # scheduled: cada vídeo é agendado para o próximo horário de pico (BRT)
          YOUTUBE_PRIVACY:          scheduled
          YOUTUBE_PUBLISH_HOURS:    "12,15,18,21"
          TELEGRAM_CHANNEL:         ${{ secrets.TELEGRAM_CHANNEL }}
          MERCADOLIVRE_AFFILIATE_ID: ${{ secrets.MERCADOLIVRE_AFFILIATE_ID }}
          PRODUCT_MODE:              "true"
        run: python run.py

      - name: Salvar histórico de jobs (pipeline.db)
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add shorts-pipeline/data/pipeline.db
          git diff --staged --quiet || git commit -m "chore: atualiza histórico de vídeos $(date +%Y-%m-%d) [skip ci]"
          git push
